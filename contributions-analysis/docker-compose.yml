version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: contributions-analysis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: contributions_analysis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - contributions_pg_data:/var/lib/postgresql/data

volumes:
  contributions_pg_data:
